<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aarya & Kartik — Premium Invitation Background</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #F8F7F3;
      --sage: #6E7A5F;
      --seal-size: clamp(168px, 20vw, 255px);
      --name-size: clamp(42px, 5vw, 72px);
      --and-size: clamp(30px, 3.5vw, 50px);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--ivory);
      overflow: hidden;
    }

    body {
      font-family: "Times New Roman", serif;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background-color: var(--ivory);
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.04) 100%),
        url('https://raw.githubusercontent.com/maryam-FOLDS/Trial/refs/heads/main/bgt.png');
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 35%, rgba(0,0,0,0.05) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .title {
      position: absolute;
      left: 50%;
      top: 36%;
      transform: translate(-50%, -50%);
      width: min(88vw, 920px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: clamp(10px, 1.6vw, 22px);
      z-index: 6;
      pointer-events: none;
    }

    .title .name,
    .title .amp {
      font-family: "Great Vibes", cursive;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.12));
    }

    .title .left-name {
      font-size: var(--name-size);
      color: var(--sage);
      text-align: right;
      padding-right: clamp(8px, 1vw, 14px);
      text-shadow: 0 1px 0 rgba(255,255,255,0.18), 0 3px 10px rgba(70, 74, 62, 0.12);
    }

    .title .amp {
      font-size: var(--and-size);
      color: rgba(248, 247, 243, 0.96);
      text-align: center;
      text-shadow: 0 1px 0 rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.12);
      transform: translateY(4px);
    }

    .title .right-name {
      font-size: var(--name-size);
      color: var(--ivory);
      text-align: left;
      padding-left: clamp(8px, 1vw, 14px);
      text-shadow: 0 1px 0 rgba(255,255,255,0.16), 0 3px 12px rgba(0,0,0,0.14);
    }

    .seal-wrap {
      position: absolute;
      left: 50%;
      top: 51%;
      transform: translate(-50%, -50%);
      width: var(--seal-size);
      height: var(--seal-size);
      display: grid;
      place-items: center;
      z-index: 5;
      pointer-events: none;
    }

    .seal {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.12));
    }

    @media (max-width: 720px) {
      .title {
        top: 35.5%;
        width: 92vw;
      }
      .seal-wrap {
        top: 50.5%;
      }
    }

    @media (orientation: landscape) {
      .title {
        top: 30%;
      }
      .seal-wrap {
        top: 52%;
        width: clamp(132px, 13vw, 192px);
        height: clamp(132px, 13vw, 192px);
      }
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Luxury invitation background">
    <div class="title" aria-label="Aarya and Kartik">
      <div class="name left-name">Aarya</div>
      <div class="amp">&amp;</div>
      <div class="name right-name">Kartik</div>
    </div>

    <div class="seal-wrap">
      <img
        class="seal"
        src="https://raw.githubusercontent.com/maryam-FOLDS/Trial/refs/heads/main/seal.png"
        alt="Seal"
      />
    </div>
  </main>

</body>
</html>
